
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Family Tree</title>

  <link rel="stylesheet" href="css/style.css" />

  <!-- Auth nav (login / logout / admin links) -->
  <nav id="authNav" style="margin-bottom:1rem;"></nav>

</head>

<body>

  <div class="page">
  <div class="card">
    <nav style="margin-bottom: 1rem;">
      <a href="index.html">🏠 Home</a>
    </nav>
    <!-- Search panel -->
    <aside id="searchPanel" style="margin-bottom:1rem;">
      <input
        type="search"
        id="personSearch"
        placeholder="Search people…"
        style="width:100%; padding:0.5rem;"
      />
      <ul id="searchResults"></ul>
    </aside>

    <!-- Standalone add person -->
    <button><a href="add.html" style="color: #ebe6e6;;">Add Person</a></button>
  </div></div>



<div class="page">
  <div class="card">

    <h1 id="name"></h1>

    <!-- Actions -->
    <div id="actions" style="margin: 0.5rem 0 1rem;">
    
    <a id="editPerson" href="#">✏️ Edit Person</a> |
    <a id="addChild" href="#">➕ Add Child</a> |
    <a id="addParent" href="#">➕ Add Parent</a> |
    <a id="addSpouse" href="#">💍 Add Spouse</a>
    </div>

    <h2>Spouse(s)</h2>
    <ul id="spouses"></ul>

    <h2>Parents</h2>
    <ul id="parents"></ul>

    <h2>Children</h2>
    <ul id="children"></ul>

    <h2>Siblings</h2>
    <ul id="siblings"></ul>

  </div>
</div>


    <script type="module" src="js/person.js"></script>
    <script type="module" src="js/search.js"></script>

    <script type="module">
      import { renderAuthNav } from "./js/auth-nav.js";
      renderAuthNav();
    </script>
