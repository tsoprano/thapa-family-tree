<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Add Person</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .section { margin-bottom: 1.5rem; }
    .box {
      border: 1px solid #ccc;
      padding: 1rem;
      border-radius: 6px;
      margin-top: 0.5rem;
    }
    .rel-row { margin-bottom: 1rem; }
    ul { list-style: none; padding-left: 0; }
    ul li { cursor: pointer; padding: 0.25rem 0; }
    ul li:hover { background: #eee; }
    button.small { margin-left: 1rem; }
  </style>
</head>

<body>

<nav id="authNav" style="margin-bottom:1rem;"></nav>
<script type="module">
  import { renderAuthNav } from "./js/auth-nav.js";
  renderAuthNav();
</script>

<div class="page">
  <div class="card">

<h1>Add Person</h1>
<p>Create a new person. Optionally add parents, spouse(s), and/or child(ren).</p>

<form id="addPersonForm">

  <!-- ========================= -->
  <!-- MAIN PERSON -->
  <!-- ========================= -->
  <div class="section">
    <h3>New Person</h3>
    <label>Full name <input name="first_name" required /></label>
    <label>Birth year <input name="birth_year" type="number" /></label>
  </div>

  <!-- ========================= -->
  <!-- PARENTS -->
  <!-- ========================= -->
  <div class="section">
    <label><input type="checkbox" id="addParentToggle" /> Add parent(s)</label>
    <div id="parentBox" class="box" hidden>
      <div id="parentsContainer"></div>
      <button type="button" id="addParentRow">➕ Add another parent</button>
    </div>
  </div>

  <!-- ========================= -->
  <!-- SPOUSES -->
  <!-- ========================= -->
  <div class="section">
    <label><input type="checkbox" id="addSpouseToggle" /> Add spouse(s)</label>
    <div id="spouseBox" class="box" hidden>
      <div id="spousesContainer"></div>
      <button type="button" id="addSpouseRow">➕ Add another spouse</button>
    </div>
  </div>

  <!-- ========================= -->
  <!-- CHILDREN -->
  <!-- ========================= -->
  <div class="section">
    <label><input type="checkbox" id="addChildToggle" /> Add child(ren)</label>
    <div id="childBox" class="box" hidden>
      <div id="childrenContainer"></div>
      <button type="button" id="addChildRow">➕ Add another child</button>
    </div>
  </div>

  <button type="submit">Create Person & Save</button>
</form>

</div>
</div>

<p><a href="index.html">⬅ Back</a></p>

<script type="module">
import { supabase } from "./js/supabase.js";

/* =========================
   TOGGLES
========================= */
const parentToggle = document.getElementById("addParentToggle");
const spouseToggle = document.getElementById("addSpouseToggle");
const childToggle  = document.getElementById("addChildToggle");

const parentBox = document.getElementById("parentBox");
const spouseBox = document.getElementById("spouseBox");
const childBox  = document.getElementById("childBox");

parentToggle.onchange = () => toggleBox(parentToggle, parentBox, parentsContainer, createParentRow);
spouseToggle.onchange = () => toggleBox(spouseToggle, spouseBox, spousesContainer, createSpouseRow);
childToggle.onchange  = () => toggleBox(childToggle, childBox, childrenContainer, createChildRow);

/* =========================
   CONTAINERS
========================= */
const parentsContainer  = document.getElementById("parentsContainer");
const spousesContainer  = document.getElementById("spousesContainer");
const childrenContainer = document.getElementById("childrenContainer");

document.getElementById("addParentRow").onclick = () => addRow(parentsContainer, createParentRow);
document.getElementById("addSpouseRow").onclick = () => addRow(spousesContainer, createSpouseRow);
document.getElementById("addChildRow").onclick  = () => addRow(childrenContainer, createChildRow);

/* =========================
   GENERIC HELPERS
========================= */
function toggleBox(toggle, box, container, factory) {
  box.hidden = !toggle.checked;
  if (toggle.checked && container.children.length === 0) {
    addRow(container, factory);
  }
}

function addRow(container, factory) {
  const row = factory(container);
  container.appendChild(row);
  setupSearch(row);
  setupRemoveRow(container, row);
}

function setupRemoveRow(container, row) {
  row.querySelector(".removeRow").onclick = () => {
    if (container.children.length <= 1) {
      alert("At least one row must remain.");
      return;
    }
    row.remove();
  };
}

/* =========================
   ROW FACTORIES
========================= */
function baseRow(label) {
  const row = document.createElement("div");
  row.className = "rel-row";
  row.innerHTML = `
    <p>
      <strong>${label}</strong>
      <button type="button" class="removeRow small">🗑 Remove</button>
    </p>
    <input type="search" class="search" placeholder="Search existing…" />
    <ul class="results"></ul>
    <p><em>Or create new</em></p>
    <input class="newName" placeholder="Full name" />
    <input class="newBirth" type="number" placeholder="Birth year" />
  `;
  return row;
}

function createParentRow() { return baseRow("Parent"); }
function createSpouseRow() { return baseRow("Spouse"); }
function createChildRow()  { return baseRow("Child"); }

/* =========================
   SEARCH SETUP
========================= */
function setupSearch(row) {
  const input = row.querySelector(".search");
  const results = row.querySelector(".results");
  let selectedId = null;

  input.addEventListener("input", async () => {
    results.innerHTML = "";
    selectedId = null;

    const q = input.value.trim();
    if (q.length < 2) return;

    const { data } = await supabase
      .from("people")
      .select("id, first_name, birth_year")
      .ilike("first_name", `%${q}%`)
      .order("first_name")
      .limit(5);

    data?.forEach(p => {
      const li = document.createElement("li");
      li.textContent = `${p.first_name}${p.birth_year ? " ("+p.birth_year+")" : ""}`;
      li.onclick = () => {
        selectedId = p.id;
        input.value = p.first_name;
        results.innerHTML = "";
      };
      results.appendChild(li);
    });
  });

  row._getSelectedId = () => selectedId;
}

/* =========================
   DUPLICATE CHECK
========================= */
async function relationshipExists(a, b, type) {
  const { data } = await supabase
    .from("relationships")
    .select("id")
    .eq("person_id", a)
    .eq("related_person_id", b)
    .eq("relationship_type", type)
    .limit(1);
  return data.length > 0;
}

/* =========================
   SUBMIT
========================= */
document.getElementById("addPersonForm").onsubmit = async (e) => {
  e.preventDefault();

  const fd = new FormData(e.target);
  const { data: person } = await supabase
    .from("people")
    .insert({
      first_name: fd.get("first_name"),
      birth_year: fd.get("birth_year") || null
    })
    .select("id")
    .single();

  const personId = person.id;

  await handleParents(personId);
  await handleSpouses(personId);
  await handleChildren(personId);

  location.href = `person.html?id=${personId}`;
};

/* =========================
   RELATIONSHIP HANDLERS
========================= */
async function resolveRowPerson(row) {
  let id = row._getSelectedId();
  if (id) return id;

  const name = row.querySelector(".newName").value.trim();
  if (!name) return null;

  const birth = row.querySelector(".newBirth").value || null;
  const { data } = await supabase
    .from("people")
    .insert({ first_name: name, birth_year: birth })
    .select("id")
    .single();
  return data.id;
}

async function handleParents(childId) {
  if (!parentToggle.checked) return;
  for (const row of parentsContainer.children) {
    const parentId = await resolveRowPerson(row);
    if (!parentId) continue;
    if (!(await relationshipExists(childId, parentId, "parent"))) {
      await supabase.from("relationships").insert({
        person_id: childId,
        related_person_id: parentId,
        relationship_type: "parent"
      });
    }
  }
}

async function handleSpouses(a) {
  if (!spouseToggle.checked) return;
  for (const row of spousesContainer.children) {
    const b = await resolveRowPerson(row);
    if (!b) continue;

    const ab = await relationshipExists(a, b, "spouse");
    const ba = await relationshipExists(b, a, "spouse");

    const inserts = [];
    if (!ab) inserts.push({ person_id: a, related_person_id: b, relationship_type: "spouse" });
    if (!ba) inserts.push({ person_id: b, related_person_id: a, relationship_type: "spouse" });

    if (inserts.length) {
      await supabase.from("relationships").insert(inserts);
    }
  }
}

async function handleChildren(parentId) {
  if (!childToggle.checked) return;
  for (const row of childrenContainer.children) {
    const childId = await resolveRowPerson(row);
    if (!childId) continue;
    if (!(await relationshipExists(childId, parentId, "parent"))) {
      await supabase.from("relationships").insert({
        person_id: childId,
        related_person_id: parentId,
        relationship_type: "parent"
      });
    }
  }
}
</script>

</body>
</html>
